<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8f7f4;
    --bg-tertiary: #f1efe8;
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  .app { max-width: 720px; margin: auto; padding: 1.5rem 1rem; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .summary-card { border-radius: 14px; padding: 14px 16px; }
  .summary-card .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.75; }
  .summary-card .amount { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .card-income { background: #d4f7e7; } .card-income .label, .card-income .amount { color: #0a6640; }
  .card-expense { background: #fde8e8; } .card-expense .label, .card-expense .amount { color: #9b1c1c; }
  .card-balance { background: #e8e8fd; } .card-balance .label, .card-balance .amount { color: #3730a3; }
  .section { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); }
  .form-group input, .form-group select { background: var(--bg-secondary); border: 0.5px solid var(--border-hover); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: 'Nunito', sans-serif; color: var(--text-primary); outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border-hover); background: transparent; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--text-secondary); }
  .type-btn.active-income { background: #d4f7e7; border-color: #0a6640; color: #0a6640; }
  .type-btn.active-expense { background: #fde8e8; border-color: #9b1c1c; color: #9b1c1c; }
  .add-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #7c3aed; color: white; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.88; }
  .txn-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .txn-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-secondary); border-radius: 10px; }
  .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .txn-info { flex: 1; }
  .txn-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .txn-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .txn-amount { font-size: 14px; font-weight: 800; }
  .txn-amount.income { color: #0a6640; }
  .txn-amount.expense { color: #9b1c1c; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 14px; padding: 4px; border-radius: 6px; }
  .del-btn:hover { background: #fde8e8; color: #9b1c1c; }
  .chart-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
  .chart-tab { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border-hover); background: transparent; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .chart-tab.active { background: #7c3aed; border-color: #7c3aed; color: white; }
  .chart-wrap { position: relative; width: 100%; height: 200px; }
  .month-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1rem; }
  .month-tab { padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--border-hover); background: transparent; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .month-tab.active { background: #f59e0b; border-color: #f59e0b; color: #78350f; }
  .empty-state { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 13px; }
  .cat-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .cat-dot { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--text-secondary); }
  .cat-dot span { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>My Finance Tracker</h1>
    <p id="current-month-label"></p>
  </div>

  <div class="summary-grid">
    <div class="summary-card card-income">
      <div class="label">Income</div>
      <div class="amount" id="total-income">₹0</div>
    </div>
    <div class="summary-card card-expense">
      <div class="label">Expenses</div>
      <div class="amount" id="total-expense">₹0</div>
    </div>
    <div class="summary-card card-balance">
      <div class="label">Balance</div>
      <div class="amount" id="total-balance">₹0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Add transaction</div>
    <div class="type-toggle">
      <button class="type-btn active-income" id="btn-income" onclick="setType('income')">+ Income</button>
      <button class="type-btn" id="btn-expense" onclick="setType('expense')">- Expense</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="txn-desc" placeholder="e.g. Salary, Groceries" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="txn-amount" placeholder="0" min="0" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="txn-cat" aria-label="Category"></select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="txn-date" aria-label="Transaction date">
      </div>
    </div>
    <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="section">
    <div class="section-title">Analytics</div>
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchChart('bar', this)">Monthly trend</button>
      <button class="chart-tab" onclick="switchChart('doughnut', this)">By category</button>
    </div>
    <div id="cat-legend" class="cat-legend" style="display:none;"></div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="section">
    <div class="section-title">Transactions</div>
    <div class="month-tabs" id="month-tabs"></div>
    <div class="txn-list" id="txn-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────
// CONFIG — update this after you deploy your backend
// ─────────────────────────────────────────────────────────────────
const API = 'https://finance-tracker-api-y25p.onrender.com';

// ─────────────────────────────────────────────────────────────────
// AUTH HELPERS  (token lives in localStorage — only the token, not data)
// ─────────────────────────────────────────────────────────────────
const getToken   = () => localStorage.getItem('ft_token');
const saveAuth   = (token, user) => { localStorage.setItem('ft_token', token); localStorage.setItem('ft_user', JSON.stringify(user)); };
const clearAuth  = () => { localStorage.removeItem('ft_token'); localStorage.removeItem('ft_user'); };
const isLoggedIn = () => !!getToken();
const getUser    = () => JSON.parse(localStorage.getItem('ft_user') || 'null');

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
}

// ─────────────────────────────────────────────────────────────────
// API WRAPPER — handles errors and auto-logout on 401
// ─────────────────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  try {
    const res = await fetch(API + path, options);
    if (res.status === 401) { doLogout(); return null; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (err) {
    showError(err.message || 'Network error — check your connection');
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────
// CONSTANTS & STATE
// ─────────────────────────────────────────────────────────────────
const CATS = {
  income: [
    { label: 'Salary',       icon: '💼', color: '#22c55e' },
    { label: 'Freelance',    icon: '💻', color: '#10b981' },
    { label: 'Investment',   icon: '📈', color: '#06b6d4' },
    { label: 'Other income', icon: '💰', color: '#84cc16' },
  ],
  expense: [
    { label: 'Food',          icon: '🍱', color: '#f97316' },
    { label: 'Transport',     icon: '🚌', color: '#8b5cf6' },
    { label: 'Shopping',      icon: '🛍', color: '#ec4899' },
    { label: 'Health',        icon: '💊', color: '#ef4444' },
    { label: 'Bills',         icon: '📄', color: '#f59e0b' },
    { label: 'Entertainment', icon: '🎬', color: '#6366f1' },
    { label: 'Other',         icon: '📦', color: '#94a3b8' },
  ]
};

let txnType       = 'income';
let transactions  = [];        // always fetched fresh from the API
let activeMonth   = null;
let chartInstance = null;
let activeChartType = 'bar';
let isLoginMode   = true;

// ─────────────────────────────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────────────────────────────
function fmt(n) { return '₹' + Math.abs(Math.round(n)).toLocaleString('en-IN'); }

function showError(msg) {
  const el = document.getElementById('auth-error');
  if (el) { el.textContent = msg; return; }
  // fallback: reuse the header subtitle
  const sub = document.getElementById('current-month-label');
  if (sub) { sub.textContent = '⚠ ' + msg; setTimeout(() => renderMonthLabel(), 3000); }
}

function renderMonthLabel() {
  document.getElementById('current-month-label').textContent =
    new Date().toLocaleString('en', { month: 'long', year: 'numeric' });
}

// ─────────────────────────────────────────────────────────────────
// AUTH SCREEN — injected above the app when logged out
// ─────────────────────────────────────────────────────────────────
function showAuthScreen() {
  document.getElementById('app-root').style.display = 'none';
  let screen = document.getElementById('auth-screen');
  if (!screen) {
    screen = document.createElement('div');
    screen.id = 'auth-screen';
    screen.style.cssText = 'max-width:400px;margin:4rem auto;padding:0 1rem;';
    document.body.insertBefore(screen, document.getElementById('app-root'));
  }
  screen.style.display = 'block';
  screen.innerHTML = `
    <div style="background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:16px;padding:2rem;">
      <h2 style="font-size:24px;font-weight:800;margin-bottom:4px;" id="auth-heading">
        ${isLoginMode ? 'Welcome back' : 'Create account'}
      </h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:1.5rem;">
        ${isLoginMode ? 'Sign in to your Finance Tracker' : 'Start tracking your finances'}
      </p>
      ${!isLoginMode ? `<div style="margin-bottom:10px;">
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;display:block;margin-bottom:4px;">Name</label>
        <input id="auth-name" type="text" placeholder="Your name"
          style="width:100%;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;background:#f8f7f4;" />
      </div>` : ''}
      <div style="margin-bottom:10px;">
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;display:block;margin-bottom:4px;">Email</label>
        <input id="auth-email" type="email" placeholder="you@example.com"
          style="width:100%;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;background:#f8f7f4;" />
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#6b7280;display:block;margin-bottom:4px;">Password</label>
        <input id="auth-password" type="password" placeholder="Min. 8 characters"
          style="width:100%;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;background:#f8f7f4;" />
      </div>
      <p id="auth-error" style="font-size:12px;color:#9b1c1c;min-height:16px;margin-bottom:8px;"></p>
      <button onclick="handleAuth()"
        style="width:100%;padding:11px;border-radius:10px;border:none;background:#7c3aed;color:white;font-family:Nunito,sans-serif;font-size:14px;font-weight:800;cursor:pointer;">
        ${isLoginMode ? 'Sign In →' : 'Create Account →'}
      </button>
      <p style="text-align:center;font-size:13px;color:#6b7280;margin-top:1rem;">
        ${isLoginMode
          ? 'No account? <a href="#" onclick="toggleAuthMode()" style="color:#7c3aed;font-weight:700;">Sign up</a>'
          : 'Have an account? <a href="#" onclick="toggleAuthMode()" style="color:#7c3aed;font-weight:700;">Sign in</a>'}
      </p>
    </div>`;
}

function toggleAuthMode() { isLoginMode = !isLoginMode; showAuthScreen(); return false; }

async function handleAuth() {
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name     = document.getElementById('auth-name')?.value.trim();
  if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (!isLoginMode && (!name || name.length < 2)) { errEl.textContent = 'Please enter your name.'; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }

  const endpoint = isLoginMode ? '/auth/login' : '/auth/signup';
  const body = isLoginMode ? { email, password } : { name, email, password };
  const data = await apiFetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!data) return;

  saveAuth(data.token, data.user);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-root').style.display = 'block';
  updateUserGreeting();
  await loadTransactions();
}

function doLogout() {
  clearAuth();
  transactions = [];
  activeMonth = null;
  showAuthScreen();
}

function updateUserGreeting() {
  const user = getUser();
  if (user) {
    document.getElementById('current-month-label').textContent =
      new Date().toLocaleString('en', { month: 'long', year: 'numeric' });
    const header = document.querySelector('.header h1');
    if (header) header.textContent = `${user.name.split(' ')[0]}'s Tracker`;
  }
  // Add a small logout link if not already there
  if (!document.getElementById('logout-btn')) {
    const logoutBtn = document.createElement('button');
    logoutBtn.id = 'logout-btn';
    logoutBtn.textContent = 'Sign out';
    logoutBtn.onclick = doLogout;
    logoutBtn.style.cssText = 'background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;padding:4px 12px;font-family:Nunito,sans-serif;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer;margin-top:6px;';
    document.querySelector('.header').appendChild(logoutBtn);
  }
}

// ─────────────────────────────────────────────────────────────────
// TRANSACTIONS — all reads/writes go through the API
// ─────────────────────────────────────────────────────────────────

// Fetch all transactions from the server and re-render
async function loadTransactions() {
  document.getElementById('txn-list').innerHTML =
    '<div class="empty-state">Loading…</div>';
  const data = await apiFetch('/transactions', { headers: authHeaders() });
  if (!data) return;
  // Normalise API shape → internal shape
  transactions = data.transactions.map(t => ({
    id:   t.id,
    type: t.type,
    desc: t.description,
    amt:  parseFloat(t.amount),
    cat:  t.category,
    date: t.date.slice(0, 10),
  }));
  render();
}

function setType(t) {
  txnType = t;
  document.getElementById('btn-income').className  = 'type-btn' + (t === 'income'  ? ' active-income'  : '');
  document.getElementById('btn-expense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
  populateCats();
}

function populateCats() {
  const sel = document.getElementById('txn-cat');
  sel.innerHTML = CATS[txnType].map(c => `<option value="${c.label}">${c.icon} ${c.label}</option>`).join('');
}

async function addTransaction() {
  const desc = document.getElementById('txn-desc').value.trim();
  const amt  = parseFloat(document.getElementById('txn-amount').value);
  const cat  = document.getElementById('txn-cat').value;
  const date = document.getElementById('txn-date').value;
  if (!desc || isNaN(amt) || amt <= 0 || !date) return;

  // Optimistic UI — prepend immediately so it feels instant
  const tempId = 'temp-' + Date.now();
  transactions.unshift({ id: tempId, type: txnType, desc, amt, cat, date });
  document.getElementById('txn-desc').value   = '';
  document.getElementById('txn-amount').value = '';
  render();

  // Persist to API
  const data = await apiFetch('/transactions', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ type: txnType, description: desc, amount: amt, category: cat, date }),
  });

  if (!data) {
    // Roll back optimistic update on failure
    transactions = transactions.filter(t => t.id !== tempId);
    render();
    return;
  }

  // Replace temp entry with the real server ID
  const idx = transactions.findIndex(t => t.id === tempId);
  if (idx !== -1) {
    transactions[idx] = {
      id:   data.transaction.id,
      type: data.transaction.type,
      desc: data.transaction.description,
      amt:  parseFloat(data.transaction.amount),
      cat:  data.transaction.category,
      date: data.transaction.date.slice(0, 10),
    };
  }
  render();
}

async function deleteTransaction(id) {
  // Optimistic UI — remove immediately
  const backup = [...transactions];
  transactions = transactions.filter(t => t.id !== id);
  render();

  const data = await apiFetch(`/transactions/${id}`, {
    method: 'DELETE',
    headers: authHeaders(),
  });

  if (!data) {
    // Roll back on failure
    transactions = backup;
    render();
  }
}

// ─────────────────────────────────────────────────────────────────
// RENDER — pure display logic, reads from `transactions` array
// ─────────────────────────────────────────────────────────────────
function getMonths() {
  return [...new Set(transactions.map(t => t.date.slice(0, 7)))].sort().reverse();
}

function getLabel(ym) {
  const [y, m] = ym.split('-');
  return new Date(y, m - 1).toLocaleString('en', { month: 'short', year: 'numeric' });
}

function render() {
  const months = getMonths();
  if (!activeMonth || !months.includes(activeMonth)) activeMonth = months[0] || null;

  const allIncome  = transactions.filter(t => t.type === 'income') .reduce((s, t) => s + t.amt, 0);
  const allExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
  document.getElementById('total-income') .textContent = fmt(allIncome);
  document.getElementById('total-expense').textContent = fmt(allExpense);
  const bal = allIncome - allExpense;
  document.getElementById('total-balance').textContent = (bal < 0 ? '-' : '') + fmt(bal);

  renderMonthLabel();

  const tabsEl = document.getElementById('month-tabs');
  tabsEl.innerHTML = months.length === 0 ? '' :
    months.map(m => `<button class="month-tab${m === activeMonth ? ' active' : ''}" onclick="setMonth('${m}')">${getLabel(m)}</button>`).join('');

  const filtered = activeMonth ? transactions.filter(t => t.date.slice(0, 7) === activeMonth) : [];
  const listEl   = document.getElementById('txn-list');
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No transactions yet. Add one above!</div>';
  } else {
    listEl.innerHTML = filtered.map(t => {
      const cats   = CATS[t.type];
      const catObj = cats.find(c => c.label === t.cat) || cats[cats.length - 1];
      const dateStr = (() => { try { return new Date(t.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); } catch { return t.date; } })();
      return `<div class="txn-item">
        <div class="txn-icon" style="background:${catObj.color}22;">${catObj.icon}</div>
        <div class="txn-info">
          <div class="txn-name">${t.desc}</div>
          <div class="txn-meta">${catObj.label} · ${dateStr}</div>
        </div>
        <div class="txn-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amt)}</div>
        <button class="del-btn" onclick="deleteTransaction(${JSON.stringify(t.id)})">✕</button>
      </div>`;
    }).join('');
  }
  renderChart();
}

function setMonth(m) { activeMonth = m; render(); }

function switchChart(type, btn) {
  activeChartType = type;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const legendEl = document.getElementById('cat-legend');

  if (activeChartType === 'bar') {
    legendEl.style.display = 'none';
    const months   = getMonths().slice(0, 6).reverse();
    const incomes  = months.map(m => transactions.filter(t => t.type === 'income'  && t.date.slice(0, 7) === m).reduce((s, t) => s + t.amt, 0));
    const expenses = months.map(m => transactions.filter(t => t.type === 'expense' && t.date.slice(0, 7) === m).reduce((s, t) => s + t.amt, 0));
    chartInstance = new Chart(document.getElementById('mainChart'), {
      type: 'bar',
      data: {
        labels: months.map(getLabel),
        datasets: [
          { label: 'Income',  data: incomes,  backgroundColor: '#22c55e', borderRadius: 6, borderSkipped: false },
          { label: 'Expense', data: expenses, backgroundColor: '#f87171', borderRadius: 6, borderSkipped: false },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Nunito', size: 11 }, autoSkip: false } },
          y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'Nunito', size: 11 }, callback: v => '₹' + v.toLocaleString('en-IN') } },
        },
      },
    });
  } else {
    const expCats = CATS.expense;
    const data  = expCats.map(c => transactions.filter(t => t.type === 'expense' && t.cat === c.label).reduce((s, t) => s + t.amt, 0));
    const total = data.reduce((a, b) => a + b, 0);
    if (total === 0) {
      legendEl.style.display = 'none';
      chartInstance = new Chart(document.getElementById('mainChart'), {
        type: 'doughnut',
        data: { labels: ['No expenses'], datasets: [{ data: [1], backgroundColor: ['#e2e8f0'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
      });
      return;
    }
    legendEl.style.display = 'flex';
    legendEl.innerHTML = expCats.filter((_, i) => data[i] > 0).map(c => {
      const v   = transactions.filter(t => t.type === 'expense' && t.cat === c.label).reduce((s, t) => s + t.amt, 0);
      const pct = total > 0 ? Math.round(v / total * 100) : 0;
      return `<span class="cat-dot"><span style="background:${c.color};"></span>${c.label} ${pct}%</span>`;
    }).join('');
    chartInstance = new Chart(document.getElementById('mainChart'), {
      type: 'doughnut',
      data: {
        labels: expCats.map(c => c.label),
        datasets: [{ data, backgroundColor: expCats.map(c => c.color), borderWidth: 2, borderColor: 'white', hoverOffset: 8 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ₹${Math.round(ctx.parsed).toLocaleString('en-IN')}` } } },
      },
    });
  }
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
const today = new Date().toISOString().slice(0, 10);
document.getElementById('txn-date').value = today;
populateCats();
renderMonthLabel();

// Wrap the app div so we can show/hide it vs the auth screen
document.querySelector('.app').id = 'app-root';

if (isLoggedIn()) {
  updateUserGreeting();
  loadTransactions();
} else {
  showAuthScreen();
}
</script>
